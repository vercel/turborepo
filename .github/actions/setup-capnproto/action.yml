name: "Setup Capnproto"
description: "Sets up capnproto for the current platform"

inputs:
  use-cache:
    description: "Whether to cache the capnproto installation. Disable for container builds."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: "Cache capnproto (Linux)"
      if: runner.os == 'Linux' && inputs.use-cache == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/cache@v4
      id: cache-capnp-linux
      with:
        path: |
          /usr/bin/capnp
          /usr/bin/capnpc
        key: ${{ runner.os }}-capnproto-1.1.0

    - name: "Setup capnproto for Linux"
      if: runner.os == 'Linux' && (steps.cache-capnp-linux.outcome == 'skipped' || steps.cache-capnp-linux.outputs.cache-hit != 'true')
      shell: bash
      run: |
        if command -v capnp &> /dev/null; then
          echo "capnp already available: $(capnp --version)"
          exit 0
        fi

        if command -v apt-get &> /dev/null; then
          sudo apt-get -y update && sudo apt-get install -y capnproto
        elif command -v apk &> /dev/null; then
          apk add capnproto-dev
        else
          curl -sSL https://capnproto.org/capnproto-c++-1.1.0.tar.gz | tar -zxf -
          cd capnproto-c++-1.1.0 && ./configure --prefix=/usr --disable-shared && make -j$(nproc) && make install && cd .. && rm -rf capnproto-c++-1.1.0
        fi

    - name: "Setup capnproto for macos"
      if: runner.os == 'macOS'
      shell: bash
      run: brew install capnp

    - name: "Cache capnproto (Windows)"
      if: runner.os == 'Windows' && inputs.use-cache == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/cache@v4
      id: cache-capnp-windows
      with:
        path: C:\capnproto
        key: ${{ runner.os }}-capnproto-1.1.0

    - name: "Setup capnproto for Windows"
      if: runner.os == 'Windows' && (steps.cache-capnp-windows.outcome == 'skipped' || steps.cache-capnp-windows.outputs.cache-hit != 'true')
      shell: pwsh
      run: |
        $url = "https://capnproto.org/capnproto-c++-win32-1.1.0.zip"
        $zip = "$env:RUNNER_TEMP\capnproto.zip"
        Write-Host "Downloading capnproto from $url"
        Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
        Expand-Archive -Path $zip -DestinationPath "C:\capnproto" -Force
        Remove-Item $zip

    - name: "Add capnproto to PATH (Windows)"
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $toolsDir = "C:\capnproto\capnproto-tools-win32-1.1.0"
        if (Test-Path "$toolsDir\capnp.exe") {
          Write-Host "Adding $toolsDir to PATH"
          echo "$toolsDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        } else {
          Write-Error "capnp.exe not found at expected path: $toolsDir"
          Get-ChildItem -Path "C:\capnproto" -Recurse | Select-Object FullName
          exit 1
        }
