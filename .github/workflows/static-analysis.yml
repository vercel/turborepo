name: Static Analysis (Stage 4b)
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to analyze'
        required: true

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  clippy:
    name: clippy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
        env:
          GIT_LFS_SKIP_SMUDGE: '1'
      - run: rustup component add clippy
      - name: Auto-fix
        run: cargo clippy --fix --allow-dirty || true
      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'style: auto-fix clippy findings'
          git push || true
      - run: cargo clippy -- -D warnings
