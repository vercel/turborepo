# LSP Pipeline
#
# Builds the LSP binaries, optionally packages the VS Code extension, and optionally
# publishes it to the VS Code Marketplace from a manual dispatch.

name: LSP

run-name: LSP ${{ inputs.ref || github.ref_name }} (${{ inputs.target || 'all' }})

on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        default: false
      dry_run:
        type: boolean
        default: true
      ref:
        type: string
        required: false
      target:
        type: string
        default: all
      package_vscode:
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      target:
        description: "LSP target to build."
        type: choice
        default: all
        options:
          - all
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
      package_vscode:
        description: "Package the VS Code extension after building all targets."
        type: boolean
        default: false
      publish:
        description: "Publish the VS Code extension to the Marketplace. Requires target=all, package_vscode=true, dry_run=false."
        type: boolean
        default: false
      dry_run:
        description: "Package the VSIX without publishing it."
        type: boolean
        default: true
      ref:
        description: "Git ref to build, such as v1.2.3 or v1.2.3-canary.0."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: lsp-${{ inputs.ref || github.ref_name }}-${{ inputs.target || 'all' }}
  cancel-in-progress: false

jobs:
  validate-inputs:
    name: "Validate inputs"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate target
        env:
          TARGET: ${{ inputs.target || 'all' }}
          PACKAGE_VSCODE: ${{ inputs.package_vscode }}
          PUBLISH: ${{ inputs.publish }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          case "$TARGET" in
            all|x86_64-apple-darwin|aarch64-apple-darwin|x86_64-unknown-linux-musl|aarch64-unknown-linux-musl|x86_64-pc-windows-msvc|aarch64-pc-windows-msvc)
              ;;
            *)
              echo "::error::Invalid LSP target '$TARGET'."
              exit 1
              ;;
          esac

          if [ "$PACKAGE_VSCODE" = "true" ] && [ "$TARGET" != "all" ]; then
            echo "::error::Packaging the VS Code extension requires target=all."
            exit 1
          fi

          if [ "$PUBLISH" = "true" ] && [ "$DRY_RUN" != "true" ] && { [ "$TARGET" != "all" ] || [ "$PACKAGE_VSCODE" != "true" ]; }; then
            echo "::error::Publishing requires target=all and package_vscode=true."
            exit 1
          fi

  build-rust:
    name: "Build Rust"
    needs: [validate-inputs]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: "x86_64-apple-darwin"
          - host: macos-latest
            target: "aarch64-apple-darwin"
          - host: ubuntu-latest
            prepare: "sudo apt-get update && sudo apt-get install -y curl musl-tools"
            target: "x86_64-unknown-linux-musl"
            setup: "sudo apt-get install -y build-essential"
          - host: ubuntu-latest
            target: "aarch64-unknown-linux-musl"
            rust-build-env: 'CC_aarch64_unknown_linux_musl=clang AR_aarch64_unknown_linux_musl=llvm-ar RUSTFLAGS="-Clink-self-contained=yes -Clinker=rust-lld"'
            setup: "sudo apt-get update && sudo apt-get install -y build-essential musl-tools clang llvm gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu"
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    timeout-minutes: 30
    steps:
      - name: Skip unselected target
        if: ${{ inputs.target != 'all' && inputs.target != matrix.settings.target }}
        run: echo "Skipping ${{ matrix.settings.target }} because target=${{ inputs.target }}."

      - name: Checkout repo
        if: ${{ inputs.target == 'all' || inputs.target == matrix.settings.target }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - name: Prepare build environment
        if: ${{ (inputs.target == 'all' || inputs.target == matrix.settings.target) && matrix.settings.prepare }}
        run: ${{ matrix.settings.prepare }}

      - name: Setup capnproto
        if: ${{ inputs.target == 'all' || inputs.target == matrix.settings.target }}
        uses: ./.github/actions/setup-capnproto

      - name: Rust Setup
        if: ${{ inputs.target == 'all' || inputs.target == matrix.settings.target }}
        uses: ./.github/actions/setup-rust
        with:
          github-token: ${{ github.token }}
          targets: ${{ matrix.settings.target }}

      - name: Build Setup
        shell: bash
        if: ${{ (inputs.target == 'all' || inputs.target == matrix.settings.target) && matrix.settings.setup }}
        run: ${{ matrix.settings.setup }}

      - name: Build
        if: ${{ inputs.target == 'all' || inputs.target == matrix.settings.target }}
        run: ${{ matrix.settings.rust-build-env }} cargo build --profile release-turborepo-lsp -p turborepo-lsp --target ${{ matrix.settings.target }}

      - name: Upload Artifacts
        if: ${{ inputs.target == 'all' || inputs.target == matrix.settings.target }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: turborepo-lsp-${{ matrix.settings.target }}
          path: target/${{ matrix.settings.target }}/release-turborepo-lsp/turborepo-lsp*

  package-vscode:
    name: "Package VS Code Extension"
    runs-on: ubuntu-24.04
    if: ${{ inputs.package_vscode && inputs.target == 'all' }}
    timeout-minutes: 30
    needs: [build-rust]
    outputs:
      version: ${{ steps.version.outputs.version }}
      pre_release: ${{ steps.version.outputs.pre_release }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          extra-flags: "--frozen-lockfile"

      - name: Validate manual publish ref
        if: ${{ inputs.publish && !inputs.dry_run }}
        env:
          PUBLISH_REF: ${{ inputs.ref || github.ref_name }}
        run: |
          if [[ ! "$PUBLISH_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-canary\.[0-9]+)?$ ]]; then
            echo "::error::Marketplace publishes must use a version tag like v1.2.3 or v1.2.3-canary.0."
            exit 1
          fi

      - name: Download darwin arm64 LSP
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: turborepo-lsp-aarch64-apple-darwin
          path: packages/turbo-vsc/out/artifacts/turborepo-lsp-aarch64-apple-darwin

      - name: Download darwin x64 LSP
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: turborepo-lsp-x86_64-apple-darwin
          path: packages/turbo-vsc/out/artifacts/turborepo-lsp-x86_64-apple-darwin

      - name: Download linux arm64 LSP
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: turborepo-lsp-aarch64-unknown-linux-musl
          path: packages/turbo-vsc/out/artifacts/turborepo-lsp-aarch64-unknown-linux-musl

      - name: Download linux x64 LSP
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: turborepo-lsp-x86_64-unknown-linux-musl
          path: packages/turbo-vsc/out/artifacts/turborepo-lsp-x86_64-unknown-linux-musl

      - name: Download win32 arm64 LSP
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: turborepo-lsp-aarch64-pc-windows-msvc
          path: packages/turbo-vsc/out/artifacts/turborepo-lsp-aarch64-pc-windows-msvc

      - name: Download win32 x64 LSP
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: turborepo-lsp-x86_64-pc-windows-msvc
          path: packages/turbo-vsc/out/artifacts/turborepo-lsp-x86_64-pc-windows-msvc

      - name: Stamp extension version
        id: version
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const version = fs
            .readFileSync("version.txt", "utf8")
            .split(/\r?\n/)[0]
            .trim();
          const match = version.match(/^(\d+)\.(\d+)\.(\d+)(?:-canary\.(\d+))?$/);
          if (!match) {
            throw new Error(
              `Invalid Turborepo version for VS Code publishing: ${version}`
            );
          }

          const [, major, minor, patch, canary] = match;
          const patchNumber = Number(patch);
          const canaryNumber = canary == null ? null : Number(canary);
          const preRelease = canaryNumber != null;

          let marketplaceMajor = Number(major);
          let marketplaceMinor = Number(minor);
          let marketplacePatch;
          if (preRelease) {
            if (patchNumber > 0) {
              marketplacePatch = (patchNumber - 1) * 1000 + canaryNumber + 1;
            } else if (marketplaceMinor > 0) {
              marketplaceMinor -= 1;
              marketplacePatch = 999000 + canaryNumber + 1;
            } else if (marketplaceMajor > 0) {
              marketplaceMajor -= 1;
              marketplaceMinor = 999;
              marketplacePatch = 999000 + canaryNumber + 1;
            } else {
              throw new Error(`Cannot map canary version ${version}`);
            }
          } else {
            marketplacePatch = patchNumber * 1000;
          }

          if (preRelease && canaryNumber >= 999) {
            throw new Error(
              `Canary version ${version} exceeds the 999 canary releases reserved before the stable version.`
            );
          }

          const marketplaceVersion = `${marketplaceMajor}.${marketplaceMinor}.${marketplacePatch}`;

          const releaseTag =
            process.env.RELEASE_REF ||
            (process.env.GITHUB_REF_TYPE === "tag" ? process.env.GITHUB_REF_NAME : "");
          if (releaseTag) {
            const tagVersion = releaseTag.startsWith("v")
              ? releaseTag.slice(1)
              : releaseTag;
            if (tagVersion !== version) {
              throw new Error(
                `Release tag ${releaseTag} does not match version.txt ${version}`
              );
            }
          }

          const packageJsonPath = "packages/turbo-vsc/package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          packageJson.version = marketplaceVersion;
          fs.writeFileSync(
            packageJsonPath,
            `${JSON.stringify(packageJson, null, 2)}\n`
          );

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `version=${marketplaceVersion}\npre_release=${preRelease}\n`
          );
          EOF

      - name: Copy LSP binaries into extension
        working-directory: packages/turbo-vsc
        run: pnpm run copy

      - name: Validate packaged binaries
        working-directory: packages/turbo-vsc
        run: |
          test -x out/turborepo-lsp-darwin-arm64
          test -x out/turborepo-lsp-darwin-x64
          test -x out/turborepo-lsp-linux-arm64
          test -x out/turborepo-lsp-linux-x64
          test -f out/turborepo-lsp-win32-arm64.exe
          test -f out/turborepo-lsp-win32-x64.exe

      - name: Compile extension
        run: pnpm --filter turbo-vsc run test-compile

      - name: Package VSIX
        working-directory: packages/turbo-vsc
        env:
          PRE_RELEASE: ${{ steps.version.outputs.pre_release }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PRE_RELEASE_FLAG=()
          if [ "$PRE_RELEASE" = "true" ]; then
            PRE_RELEASE_FLAG=("--pre-release")
          fi

          COMMIT_SHA=$(git rev-parse HEAD)
          pnpm exec vsce package \
            --no-dependencies \
            --baseContentUrl "https://github.com/vercel/turborepo/raw/${COMMIT_SHA}/packages/turbo-vsc" \
            --out "turbo-vsc-${VERSION}.vsix" \
            "${PRE_RELEASE_FLAG[@]}"

      - name: Upload VSIX
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: turbo-vsc-${{ steps.version.outputs.version }}
          path: packages/turbo-vsc/turbo-vsc-${{ steps.version.outputs.version }}.vsix

  publish-vscode:
    name: "Publish VS Code Extension"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [package-vscode]
    if: ${{ needs.package-vscode.result == 'success' && inputs.publish && !inputs.dry_run }}
    environment: vscode-marketplace
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          extra-flags: "--frozen-lockfile"

      - name: Download VSIX
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: turbo-vsc-${{ needs.package-vscode.outputs.version }}
          path: packages/turbo-vsc

      - name: Publish VSIX
        working-directory: packages/turbo-vsc
        env:
          PRE_RELEASE: ${{ needs.package-vscode.outputs.pre_release }}
          VERSION: ${{ needs.package-vscode.outputs.version }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT is required to publish the VS Code extension."
            exit 1
          fi

          PRE_RELEASE_FLAG=()
          if [ "$PRE_RELEASE" = "true" ]; then
            PRE_RELEASE_FLAG=("--pre-release")
          fi

          pnpm exec vsce publish \
            --packagePath "turbo-vsc-${VERSION}.vsix" \
            "${PRE_RELEASE_FLAG[@]}"
