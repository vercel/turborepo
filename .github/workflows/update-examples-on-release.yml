name: Update examples to latest

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-examples-pr:
    name: "Update examples PR"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Upgrade corepack
        shell: bash
        run: |
          npm install --force --global corepack@latest
          npm config get prefix >> $GITHUB_PATH

      - name: Make branch
        id: branch
        run: |
          git checkout -b post-release-bump-examples
          echo "STAGE_BRANCH=$(git branch --show-current)" >> $GITHUB_OUTPUT

      - name: Run upgrade script
        run: bash scripts/update-examples-dep.sh

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"
        run: |
          node scripts/create-github-api-commit.mjs \
            --branch "${{ steps.branch.outputs.STAGE_BRANCH }}" \
            --message "release(turborepo): update examples to latest" \
            --all-tracked \
            --if-exists update

      - name: Create pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list \
            --head "${{ steps.branch.outputs.STAGE_BRANCH }}" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url // ""')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --title "release(turborepo): update examples to latest" \
              --body "Updates examples to use the latest released Turborepo packages." \
              --head "${{ steps.branch.outputs.STAGE_BRANCH }}" \
              --base main)
          fi
          echo "html_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: PR link
        run: echo ${{ steps.pr.outputs.html_url }}
