name: sccache compile cache bench

# Temporary benchmark for futureFlags.experimentalCargoSccache: proves the
# Remote-Cache-backed compile cache works in CI with real credentials,
# which PR runs cannot do (placeholder credentials by design).
#
# Push-triggered so it runs as a non-pull_request event and receives real
# secrets. Run it twice for the comparison: the first run (cold container,
# cold compile cache) populates; a rerun (fresh container) should show
# compile-cache hits via a drastically lower cargo wall time. `--force`
# bypasses the task cache so cargo always executes.
#
# Lives only on the bench branch; not intended to merge.

on:
  push:
    branches:
      - shew/sccache-bench
  workflow_dispatch:

jobs:
  bench:
    name: Cargo build through the compile cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          node-version: 20

      - name: Install Global Turbo
        uses: ./.github/actions/install-global-turbo

      - name: Build turborepo-napi through turbo (compile cache engaged)
        run: |
          turbo --version
          TURBO_API= time turbo run build --filter=turborepo-napi --force -v --env-mode=strict
