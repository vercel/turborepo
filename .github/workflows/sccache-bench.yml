name: sccache compile cache bench

# Temporary benchmark for futureFlags.experimentalCargoSccache: proves the
# Remote-Cache-backed compile cache works in CI with real credentials,
# which PR runs cannot do (placeholder credentials by design).
#
# Push-triggered so it runs as a non-pull_request event and receives real
# secrets. Run it twice for the comparison: the first run (cold container,
# cold compile cache) populates; a rerun (fresh container) should show
# compile-cache hits via a drastically lower cargo wall time. `--force`
# bypasses the task cache so cargo always executes.
#
# Lives only on the bench branch; not intended to merge.

on:
  push:
    branches:
      - shew/sccache-bench
  workflow_dispatch:

jobs:
  bench:
    name: Cargo build through the compile cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          node-version: 20

      - name: Install Global Turbo
        uses: ./.github/actions/install-global-turbo

      - name: Build turborepo-napi through turbo (compile cache engaged)
        env:
          # Surface the proxy's per-object debug lines (hit/miss/stored).
          TURBO_LOG_VERBOSITY: "warn,turborepo_sccache_proxy=debug"
          # Loose mode passes these to the task env, and from there into the
          # sccache server the first wrapper invocation spawns.
          SCCACHE_LOG: debug
          SCCACHE_ERROR_LOG: /tmp/sccache-server.log
        run: |
          turbo --version
          TURBO_API= time turbo run build --filter=turborepo-napi --force --env-mode=loose

      - name: Compile cache summary
        if: always()
        run: |
          # Give the (detached) sccache server a moment to attempt trailing
          # uploads, then show its view of the world.
          sleep 20
          echo "=== sccache server log (last 100 lines) ==="
          tail -100 /tmp/sccache-server.log || echo "no server log written"
