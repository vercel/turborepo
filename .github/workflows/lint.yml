name: Lint
on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  determine_changes:
    name: Determine changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      formatting: ${{ steps.filter.outputs.formatting }}
      dependencies: ${{ steps.filter.outputs.dependencies }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check for changes
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            rust:
              - ".github/actions/**"
              - ".github/workflows/lint.yml"
              - "Cargo.**"
              - "crates/**"
              - ".cargo/**"
              - "rust-toolchain.toml"
            formatting:
              - "**/*.{yml,yaml,md,mdx,js,jsx,ts,tsx,json,toml,css}"
              - "pnpm-lock.yaml"
              - "package.json"
            dependencies:
              - "Cargo.lock"
              - "Cargo.toml"
              - "crates/**/Cargo.toml"
              - "pnpm-lock.yaml"
              - "package.json"
              - "packages/**/package.json"

  rust_fmt:
    name: Rust format
    needs: determine_changes
    if: ${{ needs.determine_changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run cargo fmt check
        run: cargo fmt --check

  rust_clippy:
    name: Rust clippy
    needs: determine_changes
    if: ${{ needs.determine_changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # AWS-backed sccache is disabled.
      # SCCACHE_BUCKET: turborepo-sccache
      # SCCACHE_REGION: us-east-2
      # RUSTC_WRAPPER: ${{ !github.event.pull_request.head.repo.fork && 'sccache' || '' }}
      CARGO_INCREMENTAL: 0
      # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # SCCACHE_IDLE_TIMEOUT: 0
      # SCCACHE_REQUEST_TIMEOUT: 30
      # SCCACHE_ERROR_LOG: error
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          node: "false"

      # - name: Run sccache-cache
      #   uses: mozilla-actions/sccache-action@v0.0.6

      - name: Run cargo clippy
        run: cargo lint

  rust_licenses:
    name: Rust licenses
    needs: determine_changes
    if: ${{ needs.determine_changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check licenses
        uses: EmbarkStudios/cargo-deny-action@5bb39ff5d5a0e94dc9e2dc94eced0c6129743a57 # v2
        with:
          command: check licenses

  format_lint:
    name: Formatting
    needs: determine_changes
    if: ${{ needs.determine_changes.outputs.formatting == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_CACHE: local:rw
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: "Setup Node"
        uses: ./.github/actions/setup-node

      - name: Install Global Turbo
        uses: ./.github/actions/install-global-turbo

      - name: Lint
        # Manually set TURBO_API to an empty string to override Hetzner env
        run: |
          TURBO_API= turbo run quality --env-mode=strict

  cleanup:
    name: Cleanup
    needs:
      - determine_changes
      - rust_fmt
      - rust_clippy
      - rust_licenses
      - format_lint
    if: always()
    permissions:
      actions: write
    uses: ./.github/workflows/pr-clean-caches.yml
    secrets: inherit
