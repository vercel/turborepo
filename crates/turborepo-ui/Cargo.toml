[package]
name = "turborepo-ui"
version = "0.1.0"
edition = { workspace = true }
license = "MIT"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dev-dependencies]
anyhow = { workspace = true }
indoc = { workspace = true }
serial_test = "3.0"
tempfile = { workspace = true }
test-case = { workspace = true }

[lints]
workspace = true

[features]
default = []
tui = [
  "dep:async-graphql",
  "dep:base64",
  "dep:crossterm",
  "dep:futures",
  "dep:nix",
  "dep:ratatui",
  "dep:turborepo-ghostty",
  "dep:which",
  "dep:clipboard-win",
  "dep:windows-sys",
]

[dependencies]
async-graphql = { workspace = true, optional = true }
base64 = { version = "0.22", optional = true }
chrono = { workspace = true }
console = { workspace = true }
crossterm = { version = "0.29", features = ["event-stream"], optional = true }
dialoguer = { workspace = true }
futures = { workspace = true, optional = true }
indicatif = { workspace = true }
nix = { workspace = true, features = ["signal"], optional = true }
ratatui = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
turbopath = { workspace = true }
turborepo-ci = { workspace = true }
turborepo-ghostty = { workspace = true, optional = true }
turborepo-log = { workspace = true }
turborepo-types = { workspace = true }
which = { workspace = true, optional = true }

[target."cfg(windows)".dependencies]
clipboard-win = { version = "5.3.1", optional = true }
windows-sys = { version = "0.59", features = [
  "Win32_System_Console",
], optional = true }
