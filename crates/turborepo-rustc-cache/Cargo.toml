[package]
name = "turborepo-rustc-cache"
version = "0.1.0"
edition = { workspace = true }
license = "MIT"
description = "A rustc wrapper that caches compilation artifacts using Turborepo's cache"

[[bin]]
name = "turbo-rustc-cache"
