[package]
name = "turborepo-sccache-proxy"
version = "0.1.0"
edition = { workspace = true }
license = "MIT"

[lints]
workspace = true

[dependencies]
axum = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "net", "sync"] }
tracing = { workspace = true }
turbopath = { workspace = true }
turborepo-api-client = { workspace = true }
turborepo-types = { workspace = true }

[dev-dependencies]
# The same webdav client (and version) sccache uses for storage; the
# regression tests must exercise the proxy through the real client, not
# hand-rolled HTTP.
opendal = { version = "0.55.0", default-features = false, features = [
  "services-webdav",
] }
port_scanner = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }
turborepo-vercel-api-mock = { workspace = true }
