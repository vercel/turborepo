[package]
name = "turborepo-run-cache"
version = "0.1.0"
edition = { workspace = true }
license = "MIT"
description = "Task-aware caching for Turborepo runs"

[lints]
workspace = true

[dependencies]
futures = { workspace = true }
globwalk = { version = "0.1.0", path = "../turborepo-globwalk" }
hex = { workspace = true }
itertools = { workspace = true }
serde = { workspace = true, features = ["derive"] }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt", "time"] }

tracing = { workspace = true }
turbopath = { workspace = true }
turborepo-cache = { workspace = true }
turborepo-hash = { workspace = true }
turborepo-log = { workspace = true }
turborepo-repository = { path = "../turborepo-repository" }
turborepo-scm = { workspace = true }
turborepo-task-id = { workspace = true }
turborepo-telemetry = { path = "../turborepo-telemetry" }
turborepo-types = { workspace = true }
turborepo-ui = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
