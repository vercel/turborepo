[package]
name = "turbo"
version = "0.1.0"
edition = { workspace = true }
license = "MIT"

[features]
# By default, we enable rustls-tls for reqwest via downstream transitive features.
# This is for the convenience of running daily dev workflows, i.e running
# `cargo xxx` without explicitly specifying features.
default = ["rustls-tls"]
native-tls = ["turborepo-lib/native-tls", "turborepo-lsp/native-tls"]
rustls-tls = ["turborepo-lib/rustls-tls", "turborepo-lsp/rustls-tls"]
pprof = ["turborepo-lib/pprof"]
heap-dhat = ["dep:dhat", "turborepo-lib/heap-dhat"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[build-dependencies]
build-target = "0.4.0"

[dev-dependencies]
assert_cmd = { workspace = true }
camino = { workspace = true }
dunce = { workspace = true }
insta = { version = "1.40.0", features = ["json", "filters", "redactions"] }
itertools = { workspace = true }
nix = { workspace = true, features = ["signal"] }
portable-pty = "0.9.0"
pretty_assertions = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
which = { workspace = true }

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true, features = ["backtrace"] }
dhat = { workspace = true, optional = true }
miette.workspace = true
turborepo-lib = { workspace = true, default-features = false }
turborepo-lsp = { workspace = true, default-features = false }
turborepo-query = { workspace = true }
turborepo-query-api = { workspace = true }
turborepo-signals = { workspace = true }
turborepo-ui = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.59", features = [
  "Win32_Foundation",
  "Win32_System_Console",
] }

# Not enabled on Windows: libmimalloc-sys compiles against the dynamic CRT
# (the workspace default) while libghostty-vt-sys ships static-CRT objects,
# and MSVC's /failifmismatch rejects linking both. Revisit if the Windows
# CRT choice is ever unified.
[target.'cfg(not(target_os = "windows"))'.dependencies]
mimalloc = { workspace = true }
