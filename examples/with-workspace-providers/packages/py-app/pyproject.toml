[project]
name = "py-app"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["py-util"]

[tool.uv.sources]
py-util = { workspace = true }

[dependency-groups]
dev = ["pytest>=8.0.0", "ruff>=0.6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/py_app"]
