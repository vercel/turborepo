[project]
name = "mathlib"
version = "0.1.0"
requires-python = ">=3.11"
description = "Utility math helpers for the uv provider example"

[dependency-groups]
dev = ["pytest>=8.0.0", "ruff>=0.6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mathlib"]
