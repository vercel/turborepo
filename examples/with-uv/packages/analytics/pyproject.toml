[project]
name = "analytics"
version = "0.1.0"
requires-python = ">=3.11"
description = "Simple analytics report generator"
dependencies = ["mathlib"]

[tool.uv.sources]
mathlib = { workspace = true }

[dependency-groups]
dev = ["pytest>=8.0.0", "ruff>=0.6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/analytics"]
