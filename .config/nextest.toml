# Nextest configuration for Turborepo
# See https://nexte.st/book/configuration.html

[profile.default]
failure-output = "immediate-final"

[test-groups]
windows-turbo-subprocess-heavy = { max-threads = 2 }
windows-scm = { max-threads = 2 }

[[profile.default.overrides]]
# Windows runners can fail subprocess-heavy tests under high nextest fanout with
# DLL initialization error 0xc0000142. Keep full coverage, but cap the
# integration files that create many git repos, run package managers, or spawn
# child `turbo` processes so they do not stampede process startup while the rest
# of the package still runs at normal concurrency.
filter = 'package(turbo) and (binary(run_summary) or binary(workspace_config_deps_test) or binary(lockfile_aware_caching_test) or binary(one_script_error_test) or binary(inference_test))'
platform = 'cfg(windows)'
test-group = 'windows-turbo-subprocess-heavy'

[[profile.default.overrides]]
# The same Windows process-startup limit can hit turborepo-scm tests when they
# all start git subprocesses at once. Cap fanout for this crate without
# serializing it.
filter = 'package(turborepo-scm)'
platform = 'cfg(windows)'
test-group = 'windows-scm'

[[profile.default.overrides]]
# These tests run package installs from the network during setup, which can
# take 20-60s+ on cold CI runners. Give them extra time instead of retries.
filter = 'package(turbo) and (test(prune_test::test_prune_composable_config) or test(lockfile-aware-caching/new-package))'
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.default.overrides]]
# Watch tests spawn long-running turbo watch processes with 30s internal
# timeouts. Give them extra time without restricting concurrency.
filter = 'package(turbo) and test(/^watch_/)'
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
# Cyclic package graph tests could deadlock if the validate_graph guard
# ever regresses, so cap them to prevent 45-min CI hangs.
filter = 'test(/cyclic/) or test(/cycle/)'
slow-timeout = { period = "30s", terminate-after = 2 }
