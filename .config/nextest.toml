# Nextest configuration for Turborepo
# See https://nexte.st/book/configuration.html

[profile.default]
failure-output = "immediate-final"

[[profile.default.overrides]]
# These tests run package installs from the network during setup, which can
# take 20-60s+ on cold CI runners. Give them extra time instead of retries.
filter = 'package(turbo) and (test(prune_test::test_prune_composable_config) or test(lockfile-aware-caching/new-package))'
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.default.overrides]]
# Watch tests spawn long-running turbo watch processes with 30s internal
# timeouts. Give them extra time without restricting concurrency.
filter = 'package(turbo) and test(/^watch_/)'
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
# Cyclic package graph tests could deadlock if the validate_graph guard
# ever regresses, so cap them to prevent 45-min CI hangs.
filter = 'test(/cyclic/) or test(/cycle/)'
slow-timeout = { period = "30s", terminate-after = 2 }
